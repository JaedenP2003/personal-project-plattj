<path d="M360,150 L315,168" stroke="#3a2a12" stroke-width="1.5" opacity="0.5"/>
<path d="M140,340 L178,305" stroke="#3a2a12" stroke-width="1.5" opacity="0.5"/>

<circle cx="90" cy="90" r="2.5" fill="#e8c66a" opacity="0.5"/>
<circle cx="410" cy="300" r="2" fill="#e8c66a" opacity="0.4"/>
<circle cx="100" cy="330" r="2" fill="#e8c66a" opacity="0.4"/>

<polygon points="240,70 320,210 160,210" fill="url(#goldGrad)" stroke="#5c4126" stroke-width="3"/>
<polygon points="160,210 240,350 80,350" fill="url(#goldGrad)" stroke="#5c4126" stroke-width="3"/>

<polygon points="320,140 400,280 240,280" fill="none" stroke="#a88742" stroke-width="2" stroke-dasharray="6,6" opacity="0.4"/>

<path d="M320,140 L305,175 L330,190" fill="none" stroke="#e8925a" stroke-width="2"/>
<path d="M240,280 L280,255 L300,225" fill="none" stroke="#e8925a" stroke-width="2"/>

<polygon points="330,190 372,175 385,215 345,228" fill="url(#goldGrad)" stroke="#5c4126" stroke-width="2"/>
<polygon points="300,225 335,215 325,255 292,258" fill="url(#goldGrad)" stroke="#5c4126" stroke-width="2"/>

<g transform="translate(410,190) rotate(18)">
    <polygon points="-20,-14 22,-10 12,20 -18,14" fill="url(#goldGrad)" stroke="#5c4126" stroke-width="1.5"/>
</g>
<g transform="translate(440,150) rotate(-25)" opacity="0.6">
    <polygon points="-12,-9 14,-6 8,12 -12,9" fill="url(#goldGrad)" stroke="#5c4126" stroke-width="1.2"/>
</g>
<polygon points="460,120 468,116 470,126 462,128" fill="#e8c66a" opacity="0.35"/>

<circle cx="352" cy="200" r="2.5" fill="#f7ebc7"/>
<circle cx="365" cy="210" r="1.8" fill="#f7ebc7"/>
<circle cx="340" cy="230" r="2" fill="#f7ebc7"/>
