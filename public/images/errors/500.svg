<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" width="480" height="420" role="img" aria-labelledby="title500 desc500">
<title id="title500">A shattered Triforce</title>
<desc id="desc500">Two intact golden triangles of the Triforce with the third broken apart into fragments, sparks, and drifting debris.</desc>
<defs>
    <radialGradient id="bgGlow" cx="50%" cy="46%" r="65%">
        <stop offset="0%" stop-color="#2a1f10"/>
        <stop offset="100%" stop-color="#140d08"/>
    </radialGradient>
    <radialGradient id="triGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#6b5320" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#6b5320" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f7ebc7"/>
        <stop offset="100%" stop-color="#a88742"/>
    </linearGradient>
</defs>

<rect x="0" y="0" width="480" height="420" rx="20" fill="url(#bgGlow)"/>
<circle cx="240" cy="210" r="170" fill="url(#triGlow)"/>

<path d="M240,60 L228,110" stroke="#3a2a12" stroke-width="1.5" opacity="0.5"/>
